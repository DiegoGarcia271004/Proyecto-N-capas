events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    server {
        listen 80;
        server_name localhost;

        # ── Frontend ─────────────────────────────────────────────────────────
        location / {
            root   /usr/share/nginx/html;
            index  index.html;
            # Necesario para React Router — todas las rutas desconocidas
            # van al index.html y React maneja el routing en cliente
            try_files $uri $uri/ /index.html;
        }

        # ── Backend API ───────────────────────────────────────────────────────
        location /api/ {
            proxy_pass http://backend:8080;

            # Headers estándar de proxy
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Crítico para Cookie HttpOnly + CSRF Double Submit:
            # las cookies (access_token, XSRF-TOKEN) deben pasar tal cual
            proxy_pass_header Set-Cookie;
            proxy_set_header  Cookie $http_cookie;

            # El header CSRF que manda el frontend también debe llegar al backend
            proxy_set_header X-XSRF-TOKEN $http_x_xsrf_token;
        }
    }
}