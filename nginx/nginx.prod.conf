events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # Seguridad básica — ocultar versión de nginx
    server_tokens off;

    # ── Redirigir HTTP → HTTPS ────────────────────────────────────────────────
    server {
        listen 80;
        server_name ${DOMAIN};
        return 301 https://$host$request_uri;
    }

    # ── HTTPS ─────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name ${DOMAIN};

        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # Protocolos y cifrados modernos
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Headers de seguridad HTTP
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options DENY;
        add_header X-XSS-Protection "1; mode=block";

        # ── Frontend ──────────────────────────────────────────────────────────
        location / {
            root   /usr/share/nginx/html;
            index  index.html;
            try_files $uri $uri/ /index.html;

            # Cache de assets estáticos con hash en el nombre (generados por Vite/CRA)
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }

        # ── Backend API ───────────────────────────────────────────────────────
        location /api/ {
            proxy_pass http://backend:8080;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            # Crítico para Cookie HttpOnly + CSRF Double Submit
            proxy_pass_header Set-Cookie;
            proxy_set_header  Cookie $http_cookie;
            proxy_set_header  X-XSRF-TOKEN $http_x_xsrf_token;

            # Timeouts razonables para una API REST
            proxy_connect_timeout 10s;
            proxy_read_timeout    30s;
        }
    }
}